<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>隐私政策 - Background Video Unblocker</title>
</head>
<body>
    <h2>隐私政策</h2>
    <p>1. 本扩展仅在本地浏览器运行，不会收集、上传、存储任何用户浏览记录、个人信息。</p>
    <p>2. 插件开关配置仅保存在浏览器本地存储storage.local，数据仅当前设备可见，不会同步至云端。</p>
    <p>3. 扩展无任何网络请求，不访问外部服务器，不会分享任何用户数据给第三方。</p>
    <p>4. 用户可随时通过浏览器扩展管理页卸载本插件，本地存储数据会随卸载清除。</p>
</body>
</html>
