<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Background Video Unblocker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    body {
      width: 220px;
      padding: 16px;
      background: #f7f8fa;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #222;
    }
    .switch-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .label {
      font-size: 13px;
      color: #444;
    }
    /* 简约开关样式 */
    .switch {
      position: relative;
      width: 42px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      border-radius: 22px;
      transition: .3s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: .3s;
    }
    input:checked + .slider {
      background-color: #28c76f;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
  </style>
</head>
<body>
  <div class="title">Background Video Unblocker</div>
  <div class="switch-wrap">
    <span class="label">Enable function</span>
    <label class="switch">
      <input type="checkbox" id="enableSwitch">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
